version: '3.8'

services:
  # Sentiment Analysis Application
  sentiment-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentiment-analysis-api
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      - ./powerbi_export:/app/powerbi_export
    environment:
      - MODEL_PATH=/app/models
      - DATA_PATH=/app/data
      - LOG_LEVEL=INFO
      - MAX_FEATURES=5000
      - N_TOPICS=10
    restart: unless-stopped
    networks:
      - sentiment-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: sentiment-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - sentiment-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # PostgreSQL for storing results (optional)
  postgres:
    image: postgres:14-alpine
    container_name: sentiment-postgres
    environment:
      POSTGRES_DB: sentiment_db
      POSTGRES_USER: sentiment_user
      POSTGRES_PASSWORD: sentiment_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sentiment-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentiment_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jupyter Notebook for analysis (development)
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentiment-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./models:/app/models
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''
    networks:
      - sentiment-network
    restart: unless-stopped
    profiles:
      - dev

networks:
  sentiment-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
